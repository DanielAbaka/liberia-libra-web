# Deploys the built site to the `gh-pages` branch (no GitHub Pages artifacts — avoids
# "Multiple artifacts named github-pages" / deploy-pages API errors).
#
# After first successful run, set:
#   Repo → Settings → Pages → Build and deployment → Source: "Deploy from a branch"
#   Branch: gh-pages  /  Folder: / (root)
#
# Site URL: https://<username>.github.io/<repo-name>/

name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci

      - name: Build
        env:
          VITE_BASE_PATH: /${{ github.event.repository.name }}/
        run: npm run build

      - name: Deploy to gh-pages branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: dist
