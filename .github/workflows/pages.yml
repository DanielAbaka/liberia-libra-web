# Deploys the built site to the `gh-pages` branch (no GitHub Pages artifacts — avoids
# "Multiple artifacts named github-pages" / deploy-pages API errors).
#
# After first successful run, set:
#   Repo → Settings → Pages → Build and deployment → Source: "Deploy from a branch"
#   Branch: gh-pages  /  Folder: / (root)
#
# Site URL: https://<username>.github.io/<repo-name>/

name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci

      # If this secret is missing, Vite still "builds" but the contact form shows not_configured — fail loud.
      - name: Check VITE_GOOGLE_SHEETS_WEBAPP_URL secret
        shell: bash
        env:
          SHEETS_URL: ${{ secrets.VITE_GOOGLE_SHEETS_WEBAPP_URL }}
        run: |
          if [ -z "${SHEETS_URL// }" ]; then
            echo "::error::Repository secret VITE_GOOGLE_SHEETS_WEBAPP_URL is missing or empty."
            echo "::error::GitHub → your repo → Settings → Secrets and variables → Actions → New repository secret."
            echo "::error::Name must be exactly: VITE_GOOGLE_SHEETS_WEBAPP_URL (same spelling as in pages.yml)"
            exit 1
          fi
          if [[ "$SHEETS_URL" != *"script.google.com"* ]] || [[ "$SHEETS_URL" != *"/exec"* ]]; then
            echo "::error::Secret must be the full Web app URL: https://script.google.com/macros/s/.../exec"
            exit 1
          fi

      # GitHub Pages URLs are lowercase; mixed-case repo names break script/CSS loads → blank page
      # Vite bakes VITE_* at build time. Write .env here (same as local) + export so the Node/Vite process always sees the vars.
      - name: Build
        shell: bash
        env:
          REPO_RAW: ${{ github.event.repository.name }}
          SHEETS: ${{ secrets.VITE_GOOGLE_SHEETS_WEBAPP_URL }}
          FORM_SECRET: ${{ secrets.VITE_CONTACT_FORM_SECRET }}
        run: |
          set -euo pipefail
          printf 'VITE_GOOGLE_SHEETS_WEBAPP_URL=%s\n' "$SHEETS" > .env
          printf 'VITE_CONTACT_FORM_SECRET=%s\n' "${FORM_SECRET:-}" >> .env
          export VITE_GOOGLE_SHEETS_WEBAPP_URL="$SHEETS"
          export VITE_CONTACT_FORM_SECRET="${FORM_SECRET:-}"
          export VITE_BASE_PATH="/${REPO_RAW,,}/"
          # Runtime fallbacks copied to dist/ (JSON fetch + blocking JS before React)
          node -e "const fs=require('fs');const o={webAppUrl:process.env.SHEETS||''};if(process.env.FORM_SECRET){o.formSecret=process.env.FORM_SECRET;}fs.writeFileSync('public/contact-sheet-config.json',JSON.stringify(o));fs.writeFileSync('public/sheets-config.js','window.__LL_CONTACT_SHEETS__='+JSON.stringify(o)+';');"
          npm run build
          node -e "const fs=require('fs');const h=fs.readFileSync('dist/index.html','utf8');const j=fs.existsSync('dist/sheets-config.js')&&fs.readFileSync('dist/sheets-config.js','utf8').includes('script.google.com');const inline=h.includes('__LL_CONTACT_SHEETS__')&&h.includes('script.google.com');if(!j&&!inline){console.error('::error::Sheets URL must appear in dist/sheets-config.js and/or inline in dist/index.html.');process.exit(1);}console.log('OK: Sheets URL present in build output');"

      - name: SPA fallback (refresh deep links on GitHub Pages)
        run: cp dist/index.html dist/404.html

      - name: Deploy to gh-pages branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: dist
